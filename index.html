<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUOC</title>

<!-- Google font for HUOC -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL RESET
========================= */
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:Arial, sans-serif;
}

/* =========================
   BACKGROUND CANVAS
========================= */
#container {
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

/* =========================
   TITLE BLOCK
========================= */
.title {
  position:absolute;
  top:30%;
  width:100%;
  text-align:center;
  z-index:2;
}

/* Subtitle */
.title h2{
  letter-spacing:3px;
  opacity:0.6;
  font-weight:400;
  margin-bottom:10px;
  color:white;
}

/* =========================
   🔥 HUOC TEXT MASKING ONLY
========================= */
.masked-text{
  font-size:48px;
  font-weight:bold;
  font-family:'Montserrat', sans-serif;

  /* Gradient that moves */
  background: linear-gradient(90deg, #00ff88, #ffffff, #00ff88);
  background-size:200%;

  /* Clip gradient into text */
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  /* Smooth shine animation (NOT blinking) */
  animation: shine 4s linear infinite;

  margin:0;
}

/* Moves gradient across text */
@keyframes shine {
  0% { background-position:0% }
  100% { background-position:200% }
}

/* =========================
   BUTTON STACK (NO ANIMATION)
========================= */
.buttons{
  position:absolute;
  bottom:40px;
  left:40px;
  display:flex;
  flex-direction:column;
  gap:20px;
  z-index:2;
}

/* Static clean buttons */
.buttons a{
  width:240px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;

  border:2px solid #00ff88;
  color:#00ff88;
  text-decoration:none;
  letter-spacing:2px;

  /* NO animation */
  transition:0.2s;
}

/* Simple hover (no moving lines) */
.buttons a:hover{
  background:#00ff88;
  color:black;
}

</style>
</head>

<body>

<!-- Background container -->
<div id="container"></div>

<!-- Title -->
<div class="title">
  <h2>Welcome to homeguardofbill-huoc</h2>
  <h1 class="masked-text">HUOC</h1>
</div>

<!-- Buttons -->
<div class="buttons">
  <a href="inside.html">INSIDE HUOC</a>
  <a href="#">TAKE CONTROL</a>
  <a href="#">DOWNLOAD REMOTE CONTROLS</a>
  <a href="#">BOOK WITH ALEX</a>
  <a href="#">HELPDESK</a>
  <a href="#">DASHBOARD</a>
</div>

<!-- =========================
     ZAMMAD CHAT (GLOBAL)
========================= -->
<script src="https://help.homeguardofbill-huoc.com/assets/chat/chat-no-jquery.min.js"></script>
<script>
(function() {
  new ZammadChat({
    title: 'Chat With HUOC',
    background: '#0D0202',
    fontSize: '12px',
    flat: true,
    chatId: 1
  });
})();
</script>

</body>
</html>
