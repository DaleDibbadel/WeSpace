<style>

/* =========================
   GLOBAL RESET
========================= */
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:Arial, sans-serif;
}

/* =========================
   BACKGROUND
========================= */
#container {
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

/* =========================
   TITLE
========================= */
.title {
  position:absolute;
  top:30%;
  width:100%;
  text-align:center;
  z-index:2;
}

.title h2{
  letter-spacing:3px;
  opacity:0.6;
  font-weight:400;
  margin-bottom:10px;
  color:white;
}

/* =========================
   HUOC TEXT EFFECT
========================= */
.masked-text{
  font-size:48px;
  font-weight:bold;
  font-family:'Montserrat', sans-serif;

  background: linear-gradient(90deg, #00ff88, #ffffff, #00ff88);
  background-size:200%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation: shine 4s linear infinite;
}

@keyframes shine {
  0% { background-position:0% }
  100% { background-position:200% }
}

/* =========================
   BUTTON STACK
========================= */
.buttons{
  position:absolute;
  bottom:40px;
  left:40px;
  display:flex;
  flex-direction:column;
  gap:20px;
  z-index:2;
}

/* BUTTON BASE */
.buttons a{
  position:relative;
  overflow:hidden;

  width:240px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;

  color:#00ff88;
  text-decoration:none;
  letter-spacing:2px;
  border:2px solid #00ff88;
}

/* SPANS (LINES) */
.buttons a span{
  position:absolute;
  display:block;
  background:#00ff88;
}

/* TOP */
.buttons a span:nth-child(1){
  top:0;
  left:-100%;
  width:100%;
  height:2px;
  animation:a1 1s linear infinite;
}

/* RIGHT */
.buttons a span:nth-child(2){
  top:-100%;
  right:0;
  width:2px;
  height:100%;
  animation:a2 1s linear infinite;
}

/* BOTTOM */
.buttons a span:nth-child(3){
  bottom:0;
  right:-100%;
  width:100%;
  height:2px;
  animation:a3 1s linear infinite;
}

/* LEFT */
.buttons a span:nth-child(4){
  bottom:-100%;
  left:0;
  width:2px;
  height:100%;
  animation:a4 1s linear infinite;
}

/* ANIMATIONS */
@keyframes a1 { 100% { left:100%; } }
@keyframes a2 { 100% { top:100%; } }
@keyframes a3 { 100% { right:100%; } }
@keyframes a4 { 100% { bottom:100%; } }

/* HOVER */
.buttons a:hover{
  background:#00ff88;
  color:black;
}

</style>
</head>
